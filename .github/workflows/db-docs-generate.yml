---
name: DB Docs Generate

"on":
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".tbls.yml"
      - "supabase/config.toml"

permissions:
  contents: write

concurrency:
  group: db-docs-generate-main
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase (no Studio)
        run: npx supabase start -x studio

      - name: Reset DB from migrations
        run: npx supabase db reset

      - name: Setup tbls
        run: bash scripts/setup-tbls.sh

      - name: Generate docs
        run: |
          ./.tools/tbls/bin/tbls doc --rm-dist
          ./.tools/tbls/bin/tbls out -t md -o docs/db/tbls/schema.md

      - name: Commit updated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): regenerate DB docs [skip ci]"
          file_pattern: docs/db/tbls/**
